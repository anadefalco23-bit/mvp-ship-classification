<svg width="900" height="420" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="450" y="40" font-size="26" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#0f172a">Model Test/Validation Accuracy Comparison</text>
  <g font-family="Arial" font-size="16">
    <text x="160" y="105" text-anchor="end">CNN Baseline</text>
    <rect x="180" y="85" width="278" height="28" fill="#93c5fd"/>
    <text x="470" y="105">46.4%</text>
    <text x="160" y="165" text-anchor="end">MobileNetV2</text>
    <rect x="180" y="145" width="392" height="28" fill="#a7f3d0"/>
    <text x="584" y="165">65.3%</text>
    <text x="160" y="225" text-anchor="end">ResNet50</text>
    <rect x="180" y="205" width="511" height="28" fill="#fde68a"/>
    <text x="703" y="225">85.1%</text>
    <text x="160" y="285" text-anchor="end" font-weight="bold">YOLO11n-cls</text>
    <rect x="180" y="265" width="558" height="28" fill="#fca5a5"/>
    <text x="750" y="285" font-weight="bold">92.96%</text>
  </g>
  <line x1="180" y1="340" x2="780" y2="340" stroke="#334155" stroke-width="2"/>
  <text x="180" y="365" font-family="Arial" font-size="12" text-anchor="middle">0%</text>
  <text x="480" y="365" font-family="Arial" font-size="12" text-anchor="middle">50%</text>
  <text x="780" y="365" font-family="Arial" font-size="12" text-anchor="middle">100%</text>
</svg>
